<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>GymRat</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">GR</div>

        <nav class="nav">
            <button class="nav-btn active">🏠</button>
            <button class="nav-btn">🏋️</button>
            <button class="nav-btn">📋</button>
            <button class="nav-btn">📅</button>
        </nav>

    </div>  
    <!-- Main -->
    <div class="main">
    
    <!-- Top Bar-->
    <div class="topbar">
        <div class="topbar-left"></div>
        <div class="toggle-title">Dashboard</div>
        <div class="topbar-sub">Thursday, June 4 - Week 1</div>
    </div>
    <div class="topbar-right">
        <div class="avatar">JD</div>
    </div>


    <!-- Content -->
    <div class="content">
        
        <!-- DASHBOARD PAGE -->
         <div class="page active" id="page-home">
            <!-- STAT CARDS -->
            <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val">34</div>
                <div class="stat-label">Workouts</div>
                <div class="stat-change positive">↑ 3 times this week</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">45k</div>
                <div class="stat-label">Lbs Lifted</div>
                <div class="stat-change positive">↑ 12% vs last week</div>
            </div>
            <div class="stat-card">
                <div class="stat-val">1h 14m</div>
                <div class="stat-label">Avg Duration</div>
                <div class="stat-change neutral">→ Steady</div>
            </div>
         </div>

        <!-- WORKOUTS PAGE -->
        <div class="page" id="page-workout">
            <h1>Today's Workouts</h1>
        </div>
        
        <!-- MUSCLES PAGE -->
         <div class="page" id="page-muscles">
            <h1>Muscles Recovery</h1>
         </div>

        <!-- LOG PAGE -->
         <div class="page" id="page-log">
            <h1>Log Exercise</h1>
         </div>
        

        <!-- HISTORY PAGE -->
         <div class="page" id="page-history">
            <h1> History</h1>
         </div>
        



    </div>


</div>

<script src="js/app.js"></script>
</body>
</html>
